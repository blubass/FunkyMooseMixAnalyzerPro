name: Plugin Release

on:
  push:
    tags:
      - "plugin-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to package and publish, for example plugin-v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  PRODUCT_NAME: "Funky Moose Mix Analyzer"
  RELEASE_BASENAME: "Funky-Moose-Mix-Analyzer"
  PLUGINVAL_VERSION: "v1.0.4"
  PLUGINVAL_STRICTNESS: "5"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-macos:
    name: Build macOS VST3, AU, and Standalone
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Checkout JUCE
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git "$RUNNER_TEMP/JUCE"

      - name: Configure
        run: |
          cmake -S plugin -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64" \
            -DMIX_ANALYZER_JUCE_DIR="$RUNNER_TEMP/JUCE"

      - name: Build
        run: |
          cmake --build build --config Release --parallel

      - name: Run analysis tests
        run: |
          ctest --test-dir build --build-config Release --output-on-failure

      - name: Install pluginval
        run: |
          set -euo pipefail

          curl -fsSL \
            -o "$RUNNER_TEMP/pluginval_macOS.zip" \
            "https://github.com/Tracktion/pluginval/releases/download/${PLUGINVAL_VERSION}/pluginval_macOS.zip"
          unzip -q "$RUNNER_TEMP/pluginval_macOS.zip" -d "$RUNNER_TEMP/pluginval"
          xattr -dr com.apple.quarantine "$RUNNER_TEMP/pluginval" || true

          pluginval="$(find "$RUNNER_TEMP/pluginval" -type f -path "*/pluginval.app/Contents/MacOS/pluginval" -print -quit)"
          if [[ -z "$pluginval" ]]; then
            echo "::error::pluginval executable was not found."
            exit 1
          fi

          chmod +x "$pluginval"
          echo "PLUGINVAL=$pluginval" >> "$GITHUB_ENV"

      - name: Configure optional Developer ID signing
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 || secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD || secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          echo "MACOS_SIGNING_IDENTITY=-" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_MODE=ad-hoc" >> "$GITHUB_ENV"
          echo "MACOS_NOTARIZATION_ENABLED=false" >> "$GITHUB_ENV"

          if [[ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_BASE64:-}" ]]; then
            echo "::notice::No Developer ID certificate secret configured; using ad-hoc macOS signing."
            exit 0
          fi

          if [[ -z "${MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "::error::MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 is set, but MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD is missing."
            exit 1
          fi

          certificate_base64="$RUNNER_TEMP/developer-id-application.p12.base64"
          certificate_path="$RUNNER_TEMP/developer-id-application.p12"
          keychain_path="$RUNNER_TEMP/fmma-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" > "$certificate_base64"
          if ! base64 --decode "$certificate_base64" > "$certificate_path" 2>/dev/null; then
            base64 -D -i "$certificate_base64" -o "$certificate_path"
          fi

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          echo "MACOS_SIGNING_KEYCHAIN=$keychain_path" >> "$GITHUB_ENV"

          existing_keychains="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$keychain_path" $existing_keychains
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$identity" ]]; then
            echo "::error::No Developer ID Application identity was found in the imported certificate."
            security find-identity -v -p codesigning "$keychain_path" || true
            exit 1
          fi

          echo "MACOS_SIGNING_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_MODE=developer-id" >> "$GITHUB_ENV"

          if [[ -n "${APPLE_ID:-}" && -n "${APPLE_TEAM_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ]]; then
            echo "MACOS_NOTARIZATION_ENABLED=true" >> "$GITHUB_ENV"
            echo "::notice::Developer ID signing and Apple notarization are enabled for this macOS release."
          else
            echo "::warning::Developer ID signing is enabled, but notarization credentials are incomplete; skipping notarization."
          fi

      - name: Package and validate macOS artifacts
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail

          run_pluginval_checked() {
            local bundle="$1"
            local log_file

            log_file="$(mktemp "$RUNNER_TEMP/pluginval.XXXXXX")"
            set +e
            "$PLUGINVAL" --strictness-level "$PLUGINVAL_STRICTNESS" "$bundle" 2>&1 | tee "$log_file"
            local pluginval_exit="${PIPESTATUS[0]}"
            set -e

            if ! grep -Eq '^SUCCESS[[:space:]]*$' "$log_file"; then
              echo "::error::pluginval did not report SUCCESS for $bundle"
              exit 1
            fi

            if [[ "$pluginval_exit" -ne 0 ]]; then
              echo "::warning::pluginval exited with $pluginval_exit after reporting SUCCESS for $bundle"
            fi
          }

          run_auval_checked() {
            local attempt
            for attempt in 1 2 3 4 5; do
              killall AudioComponentRegistrar || true
              sleep $((attempt * 2))

              if auval -v aufx FmMa Fnky; then
                return 0
              fi

              echo "::warning::auval did not find the AU on attempt $attempt; retrying after registrar refresh"
            done

            echo "::error::auval failed after repeated AudioComponent registration attempts"
            return 1
          }

          sign_bundle() {
            local bundle="$1"

            if [[ "${MACOS_SIGNING_MODE:-ad-hoc}" == "developer-id" ]]; then
              codesign \
                --force \
                --deep \
                --options runtime \
                --timestamp \
                --sign "$MACOS_SIGNING_IDENTITY" \
                "$bundle"
            else
              codesign --force --deep --sign - "$bundle"
            fi

            codesign --verify --deep --strict --verbose=2 "$bundle"
          }

          create_macos_zip() {
            local zip_path="$1"

            rm -f "$zip_path"
            ditto -c -k --norsrc --keepParent "$package_root" "$zip_path"
          }

          notarize_macos_zip() {
            local zip_path="$1"

            echo "::notice::Submitting macOS package for Apple notarization."
            xcrun notarytool submit "$zip_path" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --wait

            xcrun stapler staple "$package_root/${PRODUCT_NAME}.app"
            xcrun stapler validate "$package_root/${PRODUCT_NAME}.app"

            for bundle in \
              "$package_root/${PRODUCT_NAME}.vst3" \
              "$package_root/${PRODUCT_NAME}.component"
            do
              if xcrun stapler staple "$bundle"; then
                xcrun stapler validate "$bundle"
              else
                echo "::warning::Could not staple notarization ticket to $bundle; the online notarization ticket can still be used by Gatekeeper."
              fi
            done

            create_macos_zip "$zip_path"
          }

          package_tag="${RELEASE_TAG//\//-}"
          package_root="dist/${RELEASE_BASENAME}-macOS-${package_tag}"
          macos_zip="dist/${RELEASE_BASENAME}-macOS-${package_tag}.zip"
          artefact_root="build/FunkyMooseMixAnalyzer_artefacts"

          mkdir -p "$package_root"

          copy_bundle() {
            local bundle_name="$1"
            local bundle_path

            bundle_path="$(find "$artefact_root" -type d -name "$bundle_name" -print -quit)"
            if [[ -z "$bundle_path" ]]; then
              echo "::error::Missing macOS bundle: $bundle_name"
              exit 1
            fi

            ditto "$bundle_path" "$package_root/$bundle_name"
          }

          copy_bundle "${PRODUCT_NAME}.vst3"
          copy_bundle "${PRODUCT_NAME}.component"
          copy_bundle "${PRODUCT_NAME}.app"

          find "$package_root" -type f -name "moduleinfo.json" -delete

          for bundle in \
            "$package_root/${PRODUCT_NAME}.vst3" \
            "$package_root/${PRODUCT_NAME}.component" \
            "$package_root/${PRODUCT_NAME}.app"
          do
            sign_bundle "$bundle"
          done

          run_pluginval_checked "$package_root/${PRODUCT_NAME}.vst3"

          au_component_dir="$HOME/Library/Audio/Plug-Ins/Components"
          installed_component="$au_component_dir/${PRODUCT_NAME}.component"
          mkdir -p "$au_component_dir"
          rm -rf "$installed_component"
          ditto "$package_root/${PRODUCT_NAME}.component" "$installed_component"
          sign_bundle "$installed_component"

          run_auval_checked
          run_pluginval_checked "$installed_component"

          if [[ "${MACOS_NOTARIZATION_ENABLED:-false}" == "true" ]]; then
            signing_note_de="Dieses Paket ist Developer-ID-signiert und Apple-notarisiert. Falls macOS beim ersten Start trotzdem nachfragt, öffne die App einmal per Rechtsklick > Öffnen."
            signing_note_en="This package is Developer ID signed and Apple-notarized. If macOS still asks during first launch, open the app once with right-click > Open."
          elif [[ "${MACOS_SIGNING_MODE:-ad-hoc}" == "developer-id" ]]; then
            signing_note_de="Dieses Paket ist Developer-ID-signiert, aber nicht Apple-notarisiert, weil die Notarisierungs-Secrets fehlen. Falls macOS beim ersten Start blockiert, öffne die App einmal per Rechtsklick > Öffnen."
            signing_note_en="This package is Developer ID signed, but not Apple-notarized because notarization secrets are missing. If macOS blocks the first launch, open the app once with right-click > Open."
          else
            signing_note_de="Dieses Paket ist ad-hoc signiert, aber nicht Apple-notarisiert. Falls macOS beim ersten Start blockiert, öffne die App einmal per Rechtsklick > Öffnen."
            signing_note_en="This package is ad-hoc signed, but not Apple-notarized. If macOS blocks the first launch, open the app once with right-click > Open."
          fi

          cat > "$package_root/README_MACOS_DE_EN.txt" <<README
          Funky Moose Mix Analyzer - macOS Build
          =====================================

          Deutsch
          -------
          Inhalt:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.component
          - Funky Moose Mix Analyzer.app

          VST3 Installation:
          1. Schließe Cubase oder deine DAW.
          2. Kopiere "Funky Moose Mix Analyzer.vst3" nach:
             ~/Library/Audio/Plug-Ins/VST3
          3. Starte Cubase neu und lasse den Plugin-Scan laufen.

          AU Installation:
          1. Schließe Logic, GarageBand oder deine AU-DAW.
          2. Kopiere "Funky Moose Mix Analyzer.component" nach:
             ~/Library/Audio/Plug-Ins/Components
          3. Starte die DAW neu und lasse den AU-Scan laufen.

          Standalone:
          - Starte "Funky Moose Mix Analyzer.app" direkt.

          Hinweis:
          $signing_note_de

          English
          -------
          Contents:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.component
          - Funky Moose Mix Analyzer.app

          VST3 installation:
          1. Close Cubase or your DAW.
          2. Copy "Funky Moose Mix Analyzer.vst3" to:
             ~/Library/Audio/Plug-Ins/VST3
          3. Restart Cubase and let it rescan plugins.

          AU installation:
          1. Close Logic, GarageBand, or your AU host.
          2. Copy "Funky Moose Mix Analyzer.component" to:
             ~/Library/Audio/Plug-Ins/Components
          3. Restart the DAW and let it rescan Audio Units.

          Standalone:
          - Run "Funky Moose Mix Analyzer.app" directly.

          Note:
          $signing_note_en
          README

          create_macos_zip "$macos_zip"

          if [[ "${MACOS_NOTARIZATION_ENABLED:-false}" == "true" ]]; then
            notarize_macos_zip "$macos_zip"
          fi

      - name: Clean up macOS signing keychain
        if: always()
        run: |
          set -euo pipefail

          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" && -f "$MACOS_SIGNING_KEYCHAIN" ]]; then
            security delete-keychain "$MACOS_SIGNING_KEYCHAIN" || true
          fi

      - name: Upload macOS release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-zip
          path: dist/*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows VST3 and Standalone
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag_name || github.ref }}

      - name: Checkout JUCE
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git "$env:RUNNER_TEMP\JUCE"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S plugin -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DMIX_ANALYZER_JUCE_DIR="$env:RUNNER_TEMP\JUCE"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Run analysis tests
        shell: pwsh
        run: |
          ctest --test-dir build --build-config Release --output-on-failure

      - name: Install pluginval
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $zip = "$env:RUNNER_TEMP\pluginval_Windows.zip"
          $target = "$env:RUNNER_TEMP\pluginval"
          Invoke-WebRequest `
            -Uri "https://github.com/Tracktion/pluginval/releases/download/$env:PLUGINVAL_VERSION/pluginval_Windows.zip" `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $target -Force

          $pluginval = Get-ChildItem -Path $target -Recurse -File -Filter "pluginval.exe" |
            Select-Object -First 1
          if (-not $pluginval) {
            throw "pluginval.exe was not found."
          }

          "PLUGINVAL=$($pluginval.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Package and validate Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false

          function Invoke-PluginvalChecked {
            param([Parameter(Mandatory = $true)][string]$BundlePath)

            $safeName = [IO.Path]::GetFileName($BundlePath) -replace '[^A-Za-z0-9_.-]', '_'
            $logPath = Join-Path $env:RUNNER_TEMP "pluginval-$safeName.log"
            if (Test-Path $logPath) {
              Remove-Item $logPath -Force
            }

            & $env:PLUGINVAL --strictness-level $env:PLUGINVAL_STRICTNESS $BundlePath 2>&1 |
              Tee-Object -FilePath $logPath
            $pluginvalExitCode = $LASTEXITCODE
            $pluginvalOutput = Get-Content -Raw -Path $logPath

            if ($pluginvalOutput -notmatch "(?m)^SUCCESS\s*$") {
              throw "pluginval did not report SUCCESS for $BundlePath."
            }

            if ($pluginvalExitCode -ne 0) {
              Write-Warning "pluginval exited with $pluginvalExitCode after reporting SUCCESS for $BundlePath."
            }
          }

          $packageTag = $env:RELEASE_TAG -replace '[\\/]', '-'
          $packageRoot = "dist\$($env:RELEASE_BASENAME)-Windows-$packageTag"
          New-Item -ItemType Directory -Force -Path $packageRoot | Out-Null

          $vst3 = Get-ChildItem -Path build/FunkyMooseMixAnalyzer_artefacts -Recurse -Directory -Filter "*.vst3" |
            Where-Object {
              $_.FullName -match "\\Release\\VST3\\" -and
              (Test-Path -LiteralPath (Join-Path $_.FullName "Contents\x86_64-win\$($_.Name)"))
            } |
            Sort-Object { $_.FullName.Length } |
            Select-Object -First 1
          if (-not $vst3) {
            throw "Missing Release Windows VST3 bundle."
          }
          $vst3Dest = Join-Path $packageRoot $vst3.Name
          if (Test-Path -LiteralPath $vst3Dest) {
            Remove-Item -LiteralPath $vst3Dest -Recurse -Force
          }
          Copy-Item -LiteralPath $vst3.FullName -Destination $vst3Dest -Recurse -Force

          $standalone = Get-ChildItem -Path build/FunkyMooseMixAnalyzer_artefacts -Recurse -File -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\Standalone\\" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $standalone) {
            throw "Missing Windows standalone executable."
          }
          Copy-Item -LiteralPath $standalone.FullName -Destination "$packageRoot\$($standalone.Name)" -Force

          Get-ChildItem -Path $packageRoot -Recurse -File -Filter "moduleinfo.json" |
            Remove-Item -Force -ErrorAction SilentlyContinue

          Invoke-PluginvalChecked $vst3Dest

          $readme = @'
          Funky Moose Mix Analyzer - Windows Build
          ========================================

          Deutsch
          -------
          Inhalt:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.exe

          VST3 Installation:
          1. Schließe Cubase oder deine DAW.
          2. Kopiere den kompletten Ordner "Funky Moose Mix Analyzer.vst3" nach:
             C:\Program Files\Common Files\VST3
          3. Starte Cubase neu und lasse den Plugin-Scan laufen.
          4. Suche nach "Funky Moose Mix Analyzer" in den Audio-Effekten.

          Standalone:
          - Starte "Funky Moose Mix Analyzer.exe" direkt.

          Hinweis:
          Der VST3-Ordner muss komplett kopiert werden. Nicht nur die einzelne Datei im
          Unterordner "Contents\x86_64-win" kopieren.

          English
          -------
          Contents:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.exe

          VST3 installation:
          1. Close Cubase or your DAW.
          2. Copy the complete folder "Funky Moose Mix Analyzer.vst3" to:
             C:\Program Files\Common Files\VST3
          3. Restart Cubase and let it rescan plugins.
          4. Search for "Funky Moose Mix Analyzer" in the audio effects list.

          Standalone:
          - Run "Funky Moose Mix Analyzer.exe" directly.

          Note:
          Copy the complete VST3 folder. Do not copy only the single binary inside
          "Contents\x86_64-win".
          '@
          $readme | Set-Content -Path "$packageRoot\README_WINDOWS_DE_EN.txt" -Encoding UTF8

          Compress-Archive `
            -Path $packageRoot `
            -DestinationPath "dist\$($env:RELEASE_BASENAME)-Windows-$packageTag.zip" `
            -Force

      - name: Upload Windows release ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-zip
          path: dist/*.zip
          if-no-files-found: error

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event.inputs.tag_name || github.ref_name }}

    steps:
      - name: Download release ZIPs
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-release-zip"
          merge-multiple: true

      - name: Write release notes
        run: |
          cat > release-notes.md <<'NOTES'
          ## Deutsch

          Automatischer Plugin-Release für Funky Moose Mix Analyzer.

          Enthalten:
          - macOS: VST3, AU Component und Standalone App
          - Windows: VST3 und Standalone EXE
          - Zweisprachige Installationshinweise in jedem ZIP

          Wichtige Funktionen:
          - Live LUFS, True Peak, RMS, Crest, LRA und Transientenanalyse
          - Genre-basierte Zielwerte und professionelle Mix-Bewertung
          - Full-pass Worst-Case-Holds für belastbare Urteile
          - Low-End/Mono/Phase-, Reference- und A/B-Checks
          - Copy Report mit Mix Doctor Summary für DAW-Notizen
          - pluginval-Validierung mit Strictness Level 5 vor dem Release

          Hinweis:
          Die macOS-Builds werden im Release-Workflow signiert. Mit Apple-Developer-Secrets
          werden sie zusätzlich Developer-ID-signiert und notarisiert; der ZIP-README nennt
          den genauen Status.

          ## English

          Automated plugin release for Funky Moose Mix Analyzer.

          Included:
          - macOS: VST3, AU Component, and Standalone App
          - Windows: VST3 and Standalone EXE
          - Bilingual install notes in each ZIP

          Key features:
          - Live LUFS, True Peak, RMS, crest, LRA, and transient analysis
          - Genre-aware targets and professional mix judgement
          - Full-pass worst-case holds for reliable decisions
          - Low-end/mono/phase, reference, and A/B checks
          - Copy report with Mix Doctor Summary for DAW notes
          - pluginval validation at strictness level 5 before release

          Note:
          macOS builds are signed in the release workflow. With Apple developer secrets
          they are additionally Developer ID signed and notarized; the ZIP README states
          the exact status.
          NOTES

      - name: Create or update release
        run: |
          set -euo pipefail

          title="Funky Moose Mix Analyzer Plugin ${RELEASE_TAG#plugin-}"

          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md

            gh release upload "$RELEASE_TAG" release-assets/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/*.zip \
              --repo "$GITHUB_REPOSITORY" \
              --title "$title" \
              --notes-file release-notes.md \
              --verify-tag
          fi
