name: Windows Plugin Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "plugin/**"
      - ".github/workflows/windows-plugin-build.yml"

permissions:
  contents: read

jobs:
  build-windows:
    name: Build VST3 and Standalone on Windows
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout JUCE
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/juce-framework/JUCE.git "$env:RUNNER_TEMP\JUCE"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S plugin -B build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DMIX_ANALYZER_JUCE_DIR="$env:RUNNER_TEMP\JUCE"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null

          Get-ChildItem -Path build/FunkyMooseMixAnalyzer_artefacts -Recurse -Directory -Filter "*.vst3" |
            ForEach-Object {
              Copy-Item $_.FullName -Destination "dist/$($_.Name)" -Recurse -Force
            }

          Get-ChildItem -Path build/FunkyMooseMixAnalyzer_artefacts -Recurse -File -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\Standalone\\" } |
            ForEach-Object {
              Copy-Item $_.FullName -Destination "dist/$($_.Name)" -Force
            }

          Get-ChildItem -Path dist -Recurse -File -Filter "moduleinfo.json" |
            Remove-Item -Force

          $readme = @'
          Funky Moose Mix Analyzer - Windows Build
          ========================================

          Deutsch
          -------
          Inhalt:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.exe

          VST3 Installation:
          1. Schließe Cubase oder deine DAW.
          2. Kopiere den kompletten Ordner "Funky Moose Mix Analyzer.vst3" nach:
             C:\Program Files\Common Files\VST3
          3. Starte Cubase neu und lasse den Plugin-Scan laufen.
          4. Suche nach "Funky Moose Mix Analyzer" in den Audio-Effekten.

          Standalone:
          - Starte "Funky Moose Mix Analyzer.exe" direkt.

          Hinweis:
          Der VST3-Ordner muss komplett kopiert werden. Nicht nur die einzelne Datei im
          Unterordner "Contents\x86_64-win" kopieren.

          English
          -------
          Contents:
          - Funky Moose Mix Analyzer.vst3
          - Funky Moose Mix Analyzer.exe

          VST3 installation:
          1. Close Cubase or your DAW.
          2. Copy the complete folder "Funky Moose Mix Analyzer.vst3" to:
             C:\Program Files\Common Files\VST3
          3. Restart Cubase and let it rescan plugins.
          4. Search for "Funky Moose Mix Analyzer" in the audio effects list.

          Standalone:
          - Run "Funky Moose Mix Analyzer.exe" directly.

          Note:
          Copy the complete VST3 folder. Do not copy only the single binary inside
          "Contents\x86_64-win".
          '@
          $readme | Set-Content -Path "dist/README_WINDOWS_DE_EN.txt" -Encoding UTF8

          if (-not (Get-ChildItem -Path dist -Recurse | Where-Object { -not $_.PSIsContainer })) {
            throw "No Windows plugin artifacts were collected."
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Funky-Moose-Mix-Analyzer-Windows
          path: dist/**
          if-no-files-found: error
